<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Elyra Elegants | Eidi Spin & Win Campaign</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-pattern"></div>
<div class="moon"></div>
<div class="lantern">🏮✨</div>
<div class="lantern lantern2">🏮🌟</div>
<div class="lantern lantern3">🏮🌙</div>
<div class="particles-container" id="particlesContainer"></div>

<div class="container">
  <div class="header">
    <h1>ঈদের আনন্দ দ্বিগুণ করতে Elyra Elegants এর বিশেষ<br>Eidi Spin & Win Campaign</h1>
    <div class="brand-tag">✨ ঘুরিয়ে নিন আপনার ভাগ্য ✨</div>
  </div>

  <div class="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheelCanvas" width="600" height="600"></canvas>
      <div class="pointer-indicator"></div>
      <button id="spinBtn">SPIN<br>NOW</button>
    </div>
  </div>

  <div class="footer">
    © 2026 Elyra Elegants all right reserved | by Naim Xbz 🌙
  </div>
</div>

<!-- Popup Modal -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">🎉 অভিনন্দন 🎉</h2>
    <p id="modalMessage">আপনি জিতেছেন ১০ টাকা ইদি</p>
    <button id="closeModalBtn">বন্ধ করুন</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
